{% extends "base.html" %}

{% block title %}{{ page_title }} — Система управления турнирами{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6 text-center">
            <div class="card shadow-sm">
                <div class="card-body py-4 px-3">
                    {% if error_code %}
                    <h1 class="display-4 text-muted mb-2">{{ error_code }}</h1>
                    {% endif %}
                    <h2 class="h4 mb-3">{{ heading }}</h2>
                    <p class="text-muted mb-4">{{ message }}</p>
                    {% if hint %}
                    <p class="small text-secondary mb-4">{{ hint }}</p>
                    {% endif %}
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center flex-wrap">
                        <a href="{{ url_for('public.index') }}" class="btn btn-primary">
                            <i class="fas fa-home"></i> На главную
                        </a>
                        <button type="button" class="btn btn-outline-secondary" onclick="window.location.reload()">
                            <i class="fas fa-rotate-right"></i> Обновить страницу
                        </button>
                        <button type="button" class="btn btn-outline-secondary" onclick="history.back()">
                            <i class="fas fa-arrow-left"></i> Назад
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
